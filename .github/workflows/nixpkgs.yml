name: Nixpkgs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 10 5 * *"
  workflow_dispatch:

jobs:
  update:
    name: Nixpkgs Update
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - id: configure-git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - id: update-flake-lock
        run: |
          set -euxo pipefail
          CURRENT=$(grep -oP 'nixos-\K\d{2}.\d{2}' flake.nix)
          ENDPOINT="https://api.github.com/repos/nixos/nixpkgs/tags"
          LATEST_STABLE=$(curl "$ENDPOINT" | jq -rc 'map(.name) | map(match("^\\d\\d\\.\\d\\d$").string) | sort | reverse | first')

          sed -i --regexp-extended "s/nixos-[[:digit:]]+.[[:digit:]]+/nixos-$LATEST_STABLE/g" flake.nix

          git commit -am "flake: nixpkgs input \`$CURRENT\` -> \`$LATEST_STABLE\`"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          title: "[nixpkgs] update input URL"
          branch: update-nixpkgs-url
          labels: |
            update

      - uses: benc-uk/workflow-dispatch@v1
        if: ${{ contains(fromJSON('["created", "updated"]'), steps.update-flake-lock.outputs.pull-request-operation) }}
        with:
          workflow: check.yml
          ref: refs/heads/update-nixpkgs-url
