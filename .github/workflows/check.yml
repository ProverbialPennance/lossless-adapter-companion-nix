name: Format

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: ["*"]
    paths:
      - "**.nix"
      - flake.lock
      - .github/workflows/*.yml
  merge_group:
  pull_request:
    branches: ["*"]
    paths:
      - "**.nix"
      - flake.lock
      - .github/workflows/*.yml
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          diagnostic-endpoint: ""
      - run: |
          set -euxo pipefail
          nix fmt . -- --check

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          diagnostic-endpoint: ""
      - run: |
          set -euxo pipefail
          nix build --no-link -L --verbose

  flake:
    name: Flake Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@v22
        with:
          diagnostic-endpoint: ""
      - run: |
          set -euxo pipefail
          nix -L flake check
